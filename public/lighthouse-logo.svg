<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm gradient for the lighthouse -->
    <linearGradient id="warm-gradient" x1="24" y1="0" x2="24" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="50%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#FB923C" />
    </linearGradient>
    
    <!-- Light beam gradient -->
    <radialGradient id="light-gradient" cx="24" cy="8" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#FCD34D" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FCA5A5" stop-opacity="0.1" />
    </radialGradient>
  </defs>
  
  <!-- Light beam (subtle) -->
  <circle cx="24" cy="8" r="18" fill="url(#light-gradient)" opacity="0.5" />
  
  <!-- Lighthouse base -->
  <path d="M18 42 L30 42 L30 46 L18 46 Z" fill="#78716C" opacity="0.3" />
  
  <!-- Lighthouse body (simplified, elegant) -->
  <path d="M20 14 L28 14 L28 42 L20 42 Z" fill="url(#warm-gradient)" />
  
  <!-- Light house (top) -->
  <ellipse cx="24" cy="8" rx="4" ry="4" fill="#FDE68A" />
  <path d="M20 8 L28 8 L28 14 L20 14 Z" fill="#F59E0B" opacity="0.9" />
  
  <!-- Minimal accent lines -->
  <line x1="20" y1="24" x2="28" y2="24" stroke="#FFF" stroke-width="0.5" opacity="0.3" />
  <line x1="20" y1="34" x2="28" y2="34" stroke="#FFF" stroke-width="0.5" opacity="0.3" />
</svg>
